version: "3.8"
services:
  neo4j:
    image: neo4j:5-community
    container_name: team-knowledge-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/knowledge-graph-local
      NEO4J_PLUGINS: '[]'
    restart: unless-stopped

volumes:
  neo4j_data:
